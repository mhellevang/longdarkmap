<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Long Dark — Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Georgia', serif;
  height: 100vh;
  overflow: hidden;
}

/* ── World view ──────────────────────────────────────────────────────────── */
#world-view {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d1117;
}

#map-container {
  position: relative;
  flex-shrink: 0;
}

#world-map {
  display: block;
  user-select: none;
}

/* ── Region labels ───────────────────────────────────────────────────────── */
#label-layer {
  position: absolute;
  inset: 0;
  pointer-events: none; /* layer itself is transparent; buttons handle events */
}

.region-btn {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: all;
  background: transparent;
  border: none;
  color: transparent;
  padding: 3px 9px;
  border-radius: 3px;
  font-family: Georgia, serif;
  font-size: 11px;
  line-height: 1.3;
  cursor: pointer;
  white-space: nowrap;
}
.region-btn:hover {
  background: transparent;
}

/* ── Coord display (dev mode, press D) ──────────────────────────────────── */
#coord-display, #detail-coord-display {
  position: fixed;
  bottom: 10px;
  left: 12px;
  font-size: 11px;
  color: rgba(180, 200, 220, 0.6);
  pointer-events: none;
  z-index: 300;
  display: none;
  background: rgba(8,12,18,0.78);
  padding: 4px 10px;
  border-radius: 3px;
  font-family: ui-monospace, Menlo, monospace;
  white-space: pre;
  max-width: calc(100vw - 24px);
}
#detail-coord-display.has-bbox { color: #60a5fa; }

/* Box being drawn while shift-dragging in detail dev mode. */
#draw-box {
  position: absolute;
  border: 2px dashed #60a5fa;
  background: rgba(96, 165, 250, 0.10);
  pointer-events: none;
  display: none;
  z-index: 6;
}
#draw-box.editing {
  border-style: solid;
  background: rgba(96, 165, 250, 0.06);
  pointer-events: all;
  cursor: move;
}
.resize-handle {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #60a5fa;
  border: 1px solid #0d1117;
  border-radius: 2px;
  pointer-events: all;
  display: none;
  box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
}
#draw-box.editing .resize-handle { display: block; }
.resize-handle[data-corner="nw"] { left: -7px; top:    -7px; cursor: nwse-resize; }
.resize-handle[data-corner="ne"] { right:-7px; top:    -7px; cursor: nesw-resize; }
.resize-handle[data-corner="sw"] { left: -7px; bottom: -7px; cursor: nesw-resize; }
.resize-handle[data-corner="se"] { right:-7px; bottom: -7px; cursor: nwse-resize; }

#bbox-editor {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(8, 12, 18, 0.92);
  border: 1px solid rgba(96, 165, 250, 0.55);
  padding: 6px 12px;
  border-radius: 4px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  color: #e6edf3;
  z-index: 7;
  backdrop-filter: blur(4px);
}
#bbox-editor.visible { display: flex; }
#bbox-editor-target {
  color: #60a5fa;
  max-width: 320px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#bbox-editor button {
  background: none;
  border: 1px solid rgba(96, 165, 250, 0.55);
  color: #60a5fa;
  padding: 4px 12px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background 0.12s, border-color 0.12s;
}
#bbox-editor button:hover { background: rgba(96, 165, 250, 0.16); }
#bbox-editor button.cancel {
  border-color: rgba(180, 200, 220, 0.45);
  color: #b8c2cc;
}
#bbox-editor button:disabled { opacity: 0.45; cursor: default; }
#bbox-editor .status { color: rgba(180, 200, 220, 0.65); }
#bbox-editor .status.ok    { color: #6ee7b7; }
#bbox-editor .status.error { color: #f4a4a4; }

/* ── All-boxes overlay (dev mode) ────────────────────────────────────────── */
/* Renders every PLACE_BOXES entry for the current region as a labelled
   translucent rectangle so misplaced boxes can be spotted at a glance. */
#all-boxes-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: none;
  z-index: 4;
  overflow: hidden;
}
#all-boxes-layer.visible { display: block; }
.all-box {
  position: absolute;
  border: 1px solid rgba(96, 165, 250, 0.55);
  background: rgba(96, 165, 250, 0.06);
  border-radius: 2px;
  pointer-events: all;
  cursor: pointer;
  box-sizing: border-box;
}
.all-box:hover {
  background: rgba(96, 165, 250, 0.22);
  border-color: #60a5fa;
  z-index: 6;
}
.all-box-label {
  position: absolute;
  left: 0;
  bottom: 100%;
  margin-bottom: 2px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 10px;
  line-height: 1.2;
  color: #e2eeff;
  background: rgba(8, 12, 18, 0.78);
  padding: 1px 4px;
  white-space: nowrap;
  border-radius: 2px;
  pointer-events: none;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.all-box:hover .all-box-label {
  color: #fff;
  background: rgba(96, 165, 250, 0.92);
}

/* ── Global place search (world view) ────────────────────────────────────── */
#search-wrap {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  width: min(420px, calc(100vw - 32px));
  font-family: Georgia, serif;
}
#place-search {
  width: 100%;
  background: rgba(8, 12, 18, 0.92);
  border: 1px solid rgba(110, 170, 230, 0.32);
  color: #e6edf3;
  padding: 8px 12px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.12s;
  backdrop-filter: blur(4px);
}
#place-search::placeholder { color: rgba(180, 200, 220, 0.45); }
#place-search:focus { border-color: rgba(110, 170, 230, 0.78); }

#search-results {
  margin-top: 4px;
  background: rgba(8, 12, 18, 0.96);
  border: 1px solid rgba(110, 170, 230, 0.28);
  border-radius: 4px;
  max-height: 60vh;
  overflow-y: auto;
  display: none;
  backdrop-filter: blur(4px);
}
.search-result {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid rgba(110, 170, 230, 0.10);
  color: #c9d1d9;
  padding: 7px 12px;
  font-family: inherit;
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  transition: background 0.1s;
}
.search-result:last-child { border-bottom: none; }
.search-result:hover,
.search-result.active {
  background: rgba(110, 170, 230, 0.16);
  color: #f0f6ff;
}
.search-result .result-region {
  font-size: 11px;
  color: rgba(180, 200, 220, 0.55);
  flex-shrink: 0;
  white-space: nowrap;
}
#search-empty {
  padding: 8px 12px;
  font-size: 12px;
  color: rgba(180, 200, 220, 0.45);
  font-style: italic;
}

/* Hide search whenever the detail modal is up */
body.detail-open #search-wrap { display: none; }

/* ── Detail view (modal) ─────────────────────────────────────────────────── */
#detail-view {
  display: none;
  position: fixed;
  inset: 0;
  background: #0d1117;
  z-index: 100;
}

#detail-dialog {
  width: 100%;
  height: 100%;
  background: #0d1117;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 18px;
  background: rgba(8, 12, 18, 0.97);
  border-bottom: 1px solid rgba(110, 170, 230, 0.22);
  flex-shrink: 0;
}

#back-btn {
  background: none;
  border: 1px solid rgba(110, 170, 230, 0.42);
  color: #8bb8e8;
  padding: 5px 14px;
  border-radius: 3px;
  cursor: pointer;
  font-family: Georgia, serif;
  font-size: 14px;
  transition: background 0.12s, border-color 0.12s;
  white-space: nowrap;
  flex-shrink: 0;
}
#back-btn:hover {
  background: rgba(110, 170, 230, 0.15);
  border-color: rgba(110, 170, 230, 0.8);
}

#region-title {
  font-size: 19px;
  font-weight: normal;
  color: #e6edf3;
  letter-spacing: 0.4px;
}

#zoom-controls {
  position: absolute;
  bottom: 14px;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 10;
  background: rgba(8, 12, 18, 0.75);
  padding: 5px 8px;
  border-radius: 5px;
  backdrop-filter: blur(4px);
}

#zoom-level {
  font-size: 11px;
  color: rgba(180, 200, 220, 0.6);
  min-width: 36px;
  text-align: center;
  font-family: Georgia, serif;
}

.zoom-btn {
  background: none;
  border: 1px solid rgba(110, 170, 230, 0.42);
  color: #8bb8e8;
  width: 28px;
  height: 28px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transition: background 0.12s, border-color 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.zoom-btn:hover {
  background: rgba(110, 170, 230, 0.15);
  border-color: rgba(110, 170, 230, 0.8);
}
.zoom-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

#map-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tab-btn {
  background: none;
  border: 1px solid rgba(110, 170, 230, 0.28);
  color: #8bb8e8;
  padding: 4px 11px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  font-family: Georgia, serif;
  transition: background 0.12s, border-color 0.12s;
}
.tab-btn:hover { background: rgba(110, 170, 230, 0.13); }
.tab-btn.active {
  background: rgba(110, 170, 230, 0.22);
  border-color: rgba(110, 170, 230, 0.72);
  color: #c9d8f0;
}

#map-canvas {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
}
#map-canvas:active { cursor: grabbing; }

#detail-img {
  position: absolute;
  transform-origin: 0 0;
  user-select: none;
  max-width: none;
}

/* ── Highlighted-place overlay (search target) ───────────────────────────── */
/* The pulse fades a dim spotlight in and out, then settles to a plain glowing
   border so the box stays as a "you searched for this" marker without dimming
   the rest of the map. */
#highlight-box {
  position: absolute;
  border: 3px solid #60a5fa;
  border-radius: 4px;
  box-shadow: 0 0 14px rgba(96, 165, 250, 0.7);
  pointer-events: none;
  display: none;
  z-index: 5;
  animation: highlight-pulse 1.4s ease-in-out 2 forwards;
}
/* In dev mode the highlight is grabbable: click it to start editing the
   stored bbox without having to shift-drag a fresh one. */
#highlight-box.dev-grab {
  pointer-events: all;
  cursor: grab;
}
#highlight-box.dev-grab:active { cursor: grabbing; }
@keyframes highlight-pulse {
  0%   { box-shadow: 0 0 0 9999px rgba(8,12,18,0.55), 0 0 6px  rgba(96,165,250,0.6); }
  50%  { box-shadow: 0 0 0 9999px rgba(8,12,18,0.30), 0 0 22px rgba(96,165,250,1.0); }
  100% { box-shadow: 0 0 0 9999px rgba(8,12,18,0.00), 0 0 14px rgba(96,165,250,0.7); }
}

#zoom-hint {
  position: absolute;
  bottom: 60px;
  right: 16px;
  font-size: 11px;
  color: rgba(180, 200, 220, 0.3);
  pointer-events: none;
}
</style>
</head>

function layoutWorldMap() {

// GLOBAL PLACE SEARCH

const searchInput = document.getElementById('place-search');
const resultsEl   = document.getElementById('search-results');
const REGIONS_BY_ID = Object.fromEntries(REGIONS.map(r => [r.id, r]));
const MAX_RESULTS = 30;
let activeIdx = -1;

function searchPlaces(q) {
  const ql = q.trim().toLowerCase();
  if (!ql) return [];
  // Score: exact prefix > word-boundary > substring; ties broken by region order in REGIONS.
  const regionOrder = new Map(REGIONS.map((r, i) => [r.id, i]));
  const matches = [];
  for (const p of PLACES_INDEX) {
    const nl = p.name.toLowerCase();
    let score;
    if (nl === ql) score = 0;
    else if (nl.startsWith(ql)) score = 1;
    else if (nl.includes(' ' + ql)) score = 2;
    else if (nl.includes(ql)) score = 3;
    else continue;
    matches.push({ p, score });
  }
  matches.sort((a, b) =>
    a.score - b.score
    || regionOrder.get(a.p.region) - regionOrder.get(b.p.region)
    || a.p.name.localeCompare(b.p.name));
  return matches.slice(0, MAX_RESULTS).map(m => m.p);
}

function renderResults(results) {
  resultsEl.innerHTML = '';
  activeIdx = -1;
  if (!searchInput.value.trim()) {
    resultsEl.style.display = 'none';
    return;
  }
  if (!results.length) {
    const empty = document.createElement('div');
    empty.id = 'search-empty';
    empty.textContent = 'No results';
    resultsEl.appendChild(empty);
    resultsEl.style.display = 'block';
    return;
  }
  results.forEach((p, i) => {
    const item = document.createElement('button');
    item.className = 'search-result';
    item.dataset.idx = i;
    const region = REGIONS_BY_ID[p.region];
    const nameEl = document.createElement('span');
    nameEl.className = 'result-name';
    nameEl.textContent = p.name;
    const regionEl = document.createElement('span');
    regionEl.className = 'result-region';
    regionEl.textContent = region ? region.name : p.region;
    item.append(nameEl, regionEl);
    item.addEventListener('click', () => openSearchResult(p));
    resultsEl.appendChild(item);
  });
  resultsEl.style.display = 'block';
}

function openSearchResult(p) {
  const region = REGIONS_BY_ID[p.region];
  if (!region) return;
  searchInput.value = '';
  resultsEl.style.display = 'none';
  const box = (PLACE_BOXES[p.region] || {})[p.name];
  openRegion(region, box ? { name: p.name, bbox: box } : null);
}

function setActiveResult(items, idx) {
  activeIdx = Math.max(-1, Math.min(items.length - 1, idx));
  items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
  if (activeIdx >= 0) items[activeIdx].scrollIntoView({ block: 'nearest' });
}

searchInput.addEventListener('input', () => renderResults(searchPlaces(searchInput.value)));

searchInput.addEventListener('keydown', e => {
  const items = resultsEl.querySelectorAll('.search-result');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    setActiveResult(items, activeIdx + 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    setActiveResult(items, activeIdx - 1);
  } else if (e.key === 'Enter' && items.length) {
    e.preventDefault();
    items[activeIdx >= 0 ? activeIdx : 0].click();
  } else if (e.key === 'Escape') {
    if (searchInput.value) {
      searchInput.value = '';
      resultsEl.style.display = 'none';
    } else {
      searchInput.blur();
    }
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) resultsEl.style.display = 'none';
});

// "/" focuses the search box (not while typing in another input or in dev mode).
document.addEventListener('keydown', e => {
  if (e.key !== '/') return;
  if (document.activeElement && /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
  if (detailView.style.display === 'flex') return;
  e.preventDefault();
  searchInput.focus();
  searchInput.select();
});

  if (/annot/i.test(name))   return 'Annotated';
  if (/in.game/i.test(name)) return 'In-game';
  if (/loper/i.test(name))   return 'Loper';

function openRegion(region, target) {
  regionTitle.textContent = region.name;
  mapTabsEl.innerHTML = '';

  // target: { name, bbox: [x1,y1,x2,y2] in 0..1 } or null. Persists across

// ── Pan / zoom ────────────────────────────────────────────────────────────
const MIN_ZOOM = 0.05, MAX_ZOOM = 5;
let imgW = 1, imgH = 1, panX = 0, panY = 0, zoom = 1, fitZoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
// highlightTarget: { name, bbox: [x1,y1,x2,y2] in 0..1 of the loaded image },
// or null. Set when the user opens a region via search; consumed in fitMap.
let highlightTarget = null;
// currentRegion: the REGIONS entry for the currently open detail view, used
// by the bbox editor's Save endpoint to namespace the write.
let currentRegion = null;
const highlightBox = document.getElementById('highlight-box');

const zoomOutBtn  = document.getElementById('zoom-out');
const zoomInBtn   = document.getElementById('zoom-in');
const zoomFitBtn  = document.getElementById('zoom-fit');
const zoomLevelEl = document.getElementById('zoom-level');

function updateZoomUI() {
  zoomLevelEl.textContent = Math.round(zoom / fitZoom * 100) + '%';
  zoomOutBtn.disabled = zoom <= MIN_ZOOM + 0.001;
  zoomInBtn.disabled  = zoom >= MAX_ZOOM - 0.001;
}

function applyZoom(nz, cx, cy) {
  nz = Math.min(Math.max(nz, MIN_ZOOM), MAX_ZOOM);
  panX = cx - (cx - panX) * (nz / zoom);
  panY = cy - (cy - panY) * (nz / zoom);
  zoom = nz;
  applyTransform();
}

function loadDetailMap(src) {
  detailImg.src = src;
  detailImg.onload = () => {
    imgW = detailImg.naturalWidth;
    imgH = detailImg.naturalHeight;
    if (highlightTarget) focusHighlight();
    else fitMap();
  };
}

function fitMap() {
  const cw = mapCanvas.clientWidth, ch = mapCanvas.clientHeight;
  fitZoom = Math.min(cw / imgW, ch / imgH);
  zoom = fitZoom;
  panX = (cw - imgW * zoom) / 2;
  panY = (ch - imgH * zoom) / 2;
  applyTransform();
}

// Frame the highlighted box: pick a zoom that fills ~30% of the canvas with
// the box, centre it. Box is in 0..1 image coords. We still compute fitZoom
// so the zoom % readout (zoom / fitZoom) makes sense.
function focusHighlight() {
  const cw = mapCanvas.clientWidth, ch = mapCanvas.clientHeight;
  fitZoom = Math.min(cw / imgW, ch / imgH);
  const [x1, y1, x2, y2] = highlightTarget.bbox;
  const boxW = Math.max(1, (x2 - x1) * imgW);
  const boxH = Math.max(1, (y2 - y1) * imgH);
  const target = 0.3;  // box occupies ~30% of the smaller canvas dim
  const wantedZoom = Math.min(cw * target / boxW, ch * target / boxH);
  zoom = Math.min(MAX_ZOOM, Math.max(fitZoom, wantedZoom));
  const cxImg = ((x1 + x2) / 2) * imgW;
  const cyImg = ((y1 + y2) / 2) * imgH;
  panX = cw / 2 - cxImg * zoom;
  panY = ch / 2 - cyImg * zoom;
  applyTransform();
  // Restart the pulse animation each time we refocus (e.g. on tab switch).
  highlightBox.style.animation = 'none';
  void highlightBox.offsetWidth;
  highlightBox.style.animation = '';
}

function applyTransform() {
  detailImg.style.width  = imgW + 'px';
  detailImg.style.height = imgH + 'px';
  detailImg.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  positionHighlight();
  positionAllBoxes();
  if (drawBox.style.display === 'block') updateDrawBox();
  updateZoomUI();
}

function positionHighlight() {
  if (!highlightTarget) {
    highlightBox.style.display = 'none';
    highlightBox.classList.remove('dev-grab');
    return;
  }
  const [x1, y1, x2, y2] = highlightTarget.bbox;
  const left   = panX + x1 * imgW * zoom;
  const top    = panY + y1 * imgH * zoom;
  const width  = (x2 - x1) * imgW * zoom;
  const height = (y2 - y1) * imgH * zoom;
  highlightBox.style.left   = left + 'px';
  highlightBox.style.top    = top + 'px';
  highlightBox.style.width  = width + 'px';
  highlightBox.style.height = height + 'px';
  highlightBox.style.display = 'block';
  // Make it grabbable iff dev mode is active.
  highlightBox.classList.toggle('dev-grab', !!devMode);
}

function clearHighlight() {
  highlightTarget = null;
  highlightBox.style.display = 'none';
}

// ── All-boxes overlay (dev mode) ─────────────────────────────────────────
// Renders every PLACE_BOXES entry for the current region as a labelled
// translucent rectangle so misplaced boxes are visible at a glance. Click
// any of them to grab it for editing (same flow as the search highlight).
const allBoxesLayer = document.getElementById('all-boxes-layer');
let allBoxItems = [];  // [{ el, name, bbox }]

function renderAllBoxes() {
  allBoxesLayer.innerHTML = '';
  allBoxItems = [];
  if (!currentRegion) return;
  const boxes = PLACE_BOXES[currentRegion.id] || {};
  // merge_boxes.py emits both the canonical name and instance-suffix-stripped
  // aliases for the same bbox; collapse those so we don't render duplicates.
  const seen = new Map();
  for (const [name, bbox] of Object.entries(boxes)) {
    if (!Array.isArray(bbox) || bbox.length !== 4) continue;
    const key = bbox.map(v => Number(v).toFixed(5)).join(',');
    const prev = seen.get(key);
    // Prefer the longer/more-specific name (usually the canonical one with
    // wiki disambiguation suffix) over the bare alias.
    if (!prev || name.length > prev.length) seen.set(key, name);
  }
  for (const [key, name] of seen) {
    const bbox = boxes[name];
    const el = document.createElement('div');
    el.className = 'all-box';
    el.dataset.name = name;
    const label = document.createElement('div');
    label.className = 'all-box-label';
    label.textContent = name;
    el.appendChild(label);
    el.addEventListener('mousedown', e => onAllBoxMouseDown(e, name, bbox));
    allBoxesLayer.appendChild(el);
    allBoxItems.push({ el, name, bbox: bbox.slice() });
  }
  positionAllBoxes();
}

function positionAllBoxes() {
  if (!allBoxesLayer.classList.contains('visible')) return;
  for (const it of allBoxItems) {
    const [x1, y1, x2, y2] = it.bbox;
    it.el.style.left   = (panX + x1 * imgW * zoom) + 'px';
    it.el.style.top    = (panY + y1 * imgH * zoom) + 'px';
    it.el.style.width  = ((x2 - x1) * imgW * zoom) + 'px';
    it.el.style.height = ((y2 - y1) * imgH * zoom) + 'px';
  }
}

function setAllBoxesVisible(visible) {
  allBoxesLayer.classList.toggle('visible', !!visible);
  if (visible) positionAllBoxes();
}

function onAllBoxMouseDown(e, name, bbox) {
  if (!devMode) return;
  if (e.shiftKey) return;  // let mapCanvas start a fresh shift-drag draw
  // Adopt this box as the active edit target. Save will write it back under
  // its existing name, and the new draw-box snaps onto the current location.
  highlightTarget = { name, bbox: bbox.slice() };
  drawNX0 = bbox[0]; drawNY0 = bbox[1];
  drawNX1 = bbox[2]; drawNY1 = bbox[3];
  highlightBox.style.display = 'none';
  setAllBoxesVisible(false);
  enterEditing();
  startTranslate(e);
}

zoomOutBtn.addEventListener('click', () => {
  const cw = mapCanvas.clientWidth, ch = mapCanvas.clientHeight;
  applyZoom(zoom / 1.4, cw / 2, ch / 2);
});
zoomInBtn.addEventListener('click', () => {
  const cw = mapCanvas.clientWidth, ch = mapCanvas.clientHeight;
  applyZoom(zoom * 1.4, cw / 2, ch / 2);
});
zoomFitBtn.addEventListener('click', fitMap);

mapCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r  = mapCanvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const f  = Math.pow(1.001, -e.deltaY);
  applyZoom(zoom * f, mx, my);
}, { passive: false });

// Convert a clientX/Y on the canvas to image-normalized coords (0..1).
function clientToImageNorm(clientX, clientY) {
  const r = mapCanvas.getBoundingClientRect();
  const ix = (clientX - r.left - panX) / zoom;  // pixels in image
  const iy = (clientY - r.top  - panY) / zoom;
  return [
    Math.max(0, Math.min(1, ix / imgW)),
    Math.max(0, Math.min(1, iy / imgH)),
  ];
}

// Dev-mode draw state. drawNX0/drawNY0 = NW corner, drawNX1/drawNY1 = SE corner
// after the initial drag is released and the box is normalised.
let drawing = false, drawNX0 = 0, drawNY0 = 0, drawNX1 = 0, drawNY1 = 0;
// editing = true once the user has released the initial shift-drag and is
// fine-tuning corners; the save/cancel UI is visible in this state.
let editing = false;
// resizingCorner = "nw" | "ne" | "sw" | "se" while a corner is being dragged.
let resizingCorner = null;
// translating = true while the user is dragging the body of the editing box
// (or the highlight, in dev mode) to reposition it as a whole. The anchor is
// the cursor's image-normalized position at mousedown; the orig snapshot is
// the bbox at that moment, so each mousemove computes the new bbox = orig + Δ.
let translating = false;
let translateAnchorNX = 0, translateAnchorNY = 0;
let translateOrig = [0, 0, 0, 0];

const bboxEditor       = document.getElementById('bbox-editor');
const bboxEditorTarget = document.getElementById('bbox-editor-target');
const bboxEditorStatus = document.getElementById('bbox-editor-status');
const bboxSaveBtn      = document.getElementById('bbox-save-btn');
const bboxCancelBtn    = document.getElementById('bbox-cancel-btn');

function updateDrawBox() {
  const x1 = Math.min(drawNX0, drawNX1) * imgW * zoom + panX;
  const y1 = Math.min(drawNY0, drawNY1) * imgH * zoom + panY;
  const x2 = Math.max(drawNX0, drawNX1) * imgW * zoom + panX;
  const y2 = Math.max(drawNY0, drawNY1) * imgH * zoom + panY;
  drawBox.style.left   = x1 + 'px';
  drawBox.style.top    = y1 + 'px';
  drawBox.style.width  = (x2 - x1) + 'px';
  drawBox.style.height = (y2 - y1) + 'px';
  drawBox.style.display = 'block';
}

function currentBbox() {
  return [
    Math.min(drawNX0, drawNX1),
    Math.min(drawNY0, drawNY1),
    Math.max(drawNX0, drawNX1),
    Math.max(drawNY0, drawNY1),
  ];
}

function bboxText() {
  return currentBbox().map(v => v.toFixed(5)).join(', ');
}

function refreshCoordReadout() {
  if (!devMode) return;
  detailCoordDisplay.classList.add('has-bbox');
  detailCoordDisplay.textContent =
    `bbox: [${bboxText()}]  ·  drag body to move, corners to resize  ·  Save / Cancel above`;
}

// Enter the corner-editing state: normalise NW/SE order, show handles, show
// the editor toolbar with the active highlight name (if any).
function enterEditing() {
  const x1 = Math.min(drawNX0, drawNX1);
  const y1 = Math.min(drawNY0, drawNY1);
  const x2 = Math.max(drawNX0, drawNX1);
  const y2 = Math.max(drawNY0, drawNY1);
  drawNX0 = x1; drawNY0 = y1; drawNX1 = x2; drawNY1 = y2;
  editing = true;
  drawBox.classList.add('editing');
  updateDrawBox();
  showEditorToolbar();
  refreshCoordReadout();
  setAllBoxesVisible(false);
}

function exitEditing() {
  editing = false;
  resizingCorner = null;
  drawBox.classList.remove('editing');
  drawBox.style.display = 'none';
  hideEditorToolbar();
  if (devMode && detailView.style.display === 'flex') setAllBoxesVisible(true);
}

function showEditorToolbar() {
  const region = currentRegion;
  const name = highlightTarget && highlightTarget.name;
  if (region && name) {
    bboxEditorTarget.textContent = `${region.name} · ${name}`;
    bboxSaveBtn.disabled = false;
    bboxEditorStatus.textContent = '';
  } else {
    bboxEditorTarget.textContent = 'no place selected — open via search to enable Save';
    bboxSaveBtn.disabled = true;
    bboxEditorStatus.textContent = '';
  }
  bboxEditorStatus.className = 'status';
  bboxEditor.classList.add('visible');
}

function hideEditorToolbar() {
  bboxEditor.classList.remove('visible');
  bboxEditorStatus.textContent = '';
  bboxEditorStatus.className = 'status';
}

// Resize-handle drag wiring. Each handle owns one of the four corners.
drawBox.querySelectorAll('.resize-handle').forEach(h => {
  h.addEventListener('mousedown', e => {
    if (!editing) return;
    resizingCorner = h.dataset.corner;
    e.stopPropagation();
    e.preventDefault();
  });
});

// Body drag on the editing box: translates the whole bbox without resizing.
drawBox.addEventListener('mousedown', e => {
  if (!editing) return;
  if (e.target.classList.contains('resize-handle')) return;  // handles win
  startTranslate(e);
});

// Grab the highlight (in dev mode) to start editing it directly — copies the
// stored bbox into the draw-box, hides the highlight, and immediately starts
// translating from the click point so the user can drag-to-relocate.
highlightBox.addEventListener('mousedown', e => {
  if (!devMode || !highlightTarget) return;
  drawNX0 = highlightTarget.bbox[0]; drawNY0 = highlightTarget.bbox[1];
  drawNX1 = highlightTarget.bbox[2]; drawNY1 = highlightTarget.bbox[3];
  highlightBox.style.display = 'none';
  enterEditing();
  startTranslate(e);
});

function startTranslate(e) {
  translating = true;
  [translateAnchorNX, translateAnchorNY] = clientToImageNorm(e.clientX, e.clientY);
  translateOrig = [drawNX0, drawNY0, drawNX1, drawNY1];
  e.stopPropagation();
  e.preventDefault();
}

function applyTranslate(clientX, clientY) {
  const [nx, ny] = clientToImageNorm(clientX, clientY);
  const dx = nx - translateAnchorNX;
  const dy = ny - translateAnchorNY;
  drawNX0 = translateOrig[0] + dx;
  drawNY0 = translateOrig[1] + dy;
  drawNX1 = translateOrig[2] + dx;
  drawNY1 = translateOrig[3] + dy;
  updateDrawBox();
  refreshCoordReadout();
}

function applyCornerDrag(clientX, clientY) {
  const [nx, ny] = clientToImageNorm(clientX, clientY);
  // drawNX0/Y0 is NW, drawNX1/Y1 is SE, normalised by enterEditing.
  if (resizingCorner === 'nw') { drawNX0 = nx; drawNY0 = ny; }
  if (resizingCorner === 'ne') { drawNX1 = nx; drawNY0 = ny; }
  if (resizingCorner === 'sw') { drawNX0 = nx; drawNY1 = ny; }
  if (resizingCorner === 'se') { drawNX1 = nx; drawNY1 = ny; }
  // Allow dragging past the opposite corner — currentBbox() re-sorts.
  updateDrawBox();
  refreshCoordReadout();
}

bboxCancelBtn.addEventListener('click', () => {
  exitEditing();
  // Restore the static highlight (if any) so the user keeps the search context.
  if (highlightTarget) positionHighlight();
});

bboxSaveBtn.addEventListener('click', async () => {
  if (!currentRegion || !highlightTarget) return;
  const region = currentRegion.id;
  const name   = highlightTarget.name;
  const bbox   = currentBbox();
  bboxSaveBtn.disabled = true;
  bboxEditorStatus.className = 'status';
  bboxEditorStatus.textContent = 'saving…';
  try {
    const r = await fetch('/api/place-box', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ region, name, bbox }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    // Update in-memory store + the displayed highlight, so the page reflects
    // the saved value without a reload.
    if (!PLACE_BOXES[region]) PLACE_BOXES[region] = {};
    PLACE_BOXES[region][name] = data.bbox;
    highlightTarget.bbox = data.bbox;
    // Keep the all-boxes overlay in sync so the moved box stays put when we
    // re-show the layer after exiting the editor.
    const item = allBoxItems.find(it => it.name === name);
    if (item) item.bbox = data.bbox.slice();
    bboxEditorStatus.className = 'status ok';
    bboxEditorStatus.textContent = 'saved';
    setTimeout(() => {
      exitEditing();
      positionHighlight();
    }, 600);
  } catch (e) {
    bboxEditorStatus.className = 'status error';
    bboxEditorStatus.textContent = (e && e.message) || 'save failed';
    bboxSaveBtn.disabled = false;
  }
});

mapCanvas.addEventListener('mousedown', e => {
  // Corner / body / highlight drags set their own state up; we just need to
  // NOT start a pan when one's active.
  if (resizingCorner || translating) { e.preventDefault(); return; }
  if (devMode && e.shiftKey && detailView.style.display === 'flex') {
    // Starting a fresh draw discards any prior editing state.
    if (editing) exitEditing();
    drawing = true;
    [drawNX0, drawNY0] = clientToImageNorm(e.clientX, e.clientY);
    drawNX1 = drawNX0; drawNY1 = drawNY0;
    updateDrawBox();
    e.preventDefault();
    return;
  }
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (resizingCorner) {
    applyCornerDrag(e.clientX, e.clientY);
    return;
  }
  if (translating) {
    applyTranslate(e.clientX, e.clientY);
    return;
  }
  if (drawing) {
    [drawNX1, drawNY1] = clientToImageNorm(e.clientX, e.clientY);
    updateDrawBox();
    return;
  }
  if (dragging) {
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
    return;
  }
  if (devMode && detailView.style.display === 'flex' && imgW > 1 && !editing) {
    const [nx, ny] = clientToImageNorm(e.clientX, e.clientY);
    detailCoordDisplay.classList.remove('has-bbox');
    detailCoordDisplay.textContent =
      `cursor: [${nx.toFixed(4)}, ${ny.toFixed(4)}]  ·  shift-drag to draw, or click the highlight to grab it  ·  D to hide`;
  }
});
window.addEventListener('mouseup', e => {
  if (resizingCorner) { resizingCorner = null; return; }
  if (translating) { translating = false; return; }
  if (drawing) {
    drawing = false;
    // Don't enter editing for accidental clicks (no real drag).
    const dx = Math.abs(drawNX1 - drawNX0);
    const dy = Math.abs(drawNY1 - drawNY0);
    if (dx < 0.002 || dy < 0.002) {
      drawBox.style.display = 'none';
      return;
    }
    enterEditing();
    return;
  }
  dragging = false;
});

// Touch
let lastTouchDist = 0;
mapCanvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    panStartX = panX; panStartY = panY;
  } else if (e.touches.length === 2) {
    dragging = false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
mapCanvas.addEventListener('touchmove', e => {
  if (dragging && e.touches.length === 1) {
    panX = panStartX + (e.touches[0].clientX - dragStartX);
    panY = panStartY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const f  = dist / lastTouchDist;
    lastTouchDist = dist;
    const r  = mapCanvas.getBoundingClientRect();
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    const nz = Math.min(Math.max(zoom * f, 0.04), 12);
    panX = mx - (mx - panX) * (nz / zoom);
    panY = my - (my - panY) * (nz / zoom);
    zoom = nz;
    applyTransform();
  }
}, { passive: true });
mapCanvas.addEventListener('touchend', () => { dragging = false; });

mapCanvas.addEventListener('dblclick', fitMap);


function closeModal() {
  detailView.style.display = 'none';
  document.body.classList.remove('detail-open');
  clearHighlight();
  exitEditing();
  drawBox.style.display = 'none';
  detailCoordDisplay.style.display = 'none';
  detailCoordDisplay.classList.remove('has-bbox');
  currentRegion = null;
}

backBtn.addEventListener('click', closeModal);
detailView.addEventListener('click', e => {
  if (e.target === detailView) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
